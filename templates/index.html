<!DOCTYPE html>
<html>
<head>
    <title>YouTube Comment Sentiment</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #f4f4f4; }
        .container { background: white; padding: 20px; max-width: 800px; margin: auto; border-radius: 8px; }
        input { padding: 10px; width: 100%; margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .comment { margin: 10px 0; padding: 10px; border-bottom: 1px solid #ccc; }
        .Positive { color: green; }
        .Negative { color: red; }
        .Neutral  { color: gray; }
    </style>
</head>
<body>
    <div class="container">
        <h2>YouTube Comment Sentiment Analyzer</h2>
        <form method="post">
            <input type="text" name="video_id" placeholder="Enter YouTube Video ID" required>
            <button type="submit">Analyze Comments</button>
        </form>

        {% if results %}
            <h3>Results for video ID: {{ video_id }}</h3>
            {% for comment, sentiment in results %}
                <div class="comment">
                    <strong class="{{ sentiment }}">{{ sentiment }}</strong>: {{ comment }}
                </div>
            {% endfor %}
        {% endif %}
    </div>
</body>
</html>
